displayName: GeoBlock (IPinfo.io)
type: middleware
import: github.com/leardev/traefik-geoblock-plugin
summary: Geo-blocking middleware using IPinfo Lite database with automatic updates
testData:
  allowedCountries:
    - DE
    - AT
    - CH
  token: "your-ipinfo-token"
  allowPrivate: true
  defaultAllow: false
  databaseMMDBPath: "/tmp/ipinfo_lite.mmdb"
  updateInterval: 24
