name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./...

  integration:
    name: Integration Test — CSV backend
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Generate dynamic config
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "::warning::IPINFO_TOKEN secret not set, skipping integration test"
            exit 0
          fi
          envsubst < test/docker/dynamic.yml.tpl > test/docker/dynamic.yml

      - name: Start services
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            exit 0
          fi
          docker compose -f test/docker-compose.yml up -d
          echo "Waiting for Traefik to start and download database..."
          for i in $(seq 1 60); do
            if docker compose -f test/docker-compose.yml logs traefik 2>&1 | grep -q 'database updated\|loaded CSV database from disk'; then
              echo "Database loaded!"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Timed out waiting for database"
              docker compose -f test/docker-compose.yml logs traefik
              exit 1
            fi
            sleep 5
          done

      - name: Test geo-blocking
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "Skipped (no token)"
            exit 0
          fi
          sh test/run-checks.sh || { docker compose -f test/docker-compose.yml logs traefik | grep geoblock; exit 1; }

      - name: Test database update
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "Skipped (no token)"
            exit 0
          fi

          echo "Checking database was saved to disk..."
          docker compose -f test/docker-compose.yml exec -T traefik ls -lh /data/ipinfo_lite.csv.gz
          if [ $? -ne 0 ]; then
            echo "❌ Database file not found on disk"
            exit 1
          fi
          echo "✅ Database file exists on disk"

          echo "Restarting Traefik to test loading from disk cache..."
          RESTART_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          docker compose -f test/docker-compose.yml restart traefik

          echo "Verifying database file is still present after restart..."
          docker compose -f test/docker-compose.yml exec -T traefik ls -lh /data/ipinfo_lite.csv.gz || {
            echo "❌ Database file missing after restart"
            exit 1
          }

          # Wait for geo-blocking to be active again — more reliable than grepping logs.
          READY=0
          LAST_CODE=000
          for i in $(seq 1 60); do
            LAST_CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "X-Forwarded-For: 8.8.8.8" http://localhost/ 2>/dev/null || echo 000)
            if [ "$LAST_CODE" = "403" ]; then
              echo "✅ Geo-blocking active after restart (US IP blocked)"
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -eq 0 ]; then
            echo "❌ Timed out waiting for geo-blocking after restart (last HTTP code: $LAST_CODE)"
            echo "--- Traefik logs since restart ---"
            docker compose -f test/docker-compose.yml logs traefik --since "$RESTART_AT" 2>&1 || true
            exit 1
          fi

          # Show plugin log lines from after restart for visibility.
          docker compose -f test/docker-compose.yml logs traefik --since "$RESTART_AT" 2>&1 | grep geoblock || true

      - name: Cleanup
        if: always()
        run: docker compose -f test/docker-compose.yml down -v 2>/dev/null || true

  integration-mmdb:
    name: Integration Test — MMDB backend
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Generate MMDB dynamic config
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "::warning::IPINFO_TOKEN secret not set, skipping MMDB integration test"
            exit 0
          fi
          envsubst < test/docker/dynamic.mmdb.yml.tpl > test/docker/dynamic.yml

      - name: Start services (MMDB)
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            exit 0
          fi
          docker compose -f test/docker-compose.yml up -d
          echo "Waiting for Traefik to download MMDB database..."
          for i in $(seq 1 60); do
            if docker compose -f test/docker-compose.yml logs traefik 2>&1 | grep -q 'MMDB database updated\|loaded MMDB database from disk'; then
              echo "MMDB loaded!"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Timed out waiting for MMDB database"
              docker compose -f test/docker-compose.yml logs traefik
              exit 1
            fi
            sleep 5
          done

      - name: Test geo-blocking (MMDB)
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "Skipped (no token)"
            exit 0
          fi
          sh test/run-checks.sh || { docker compose -f test/docker-compose.yml logs traefik | grep geoblock; exit 1; }

      - name: Verify MMDB file on disk
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "Skipped (no token)"
            exit 0
          fi
          docker compose -f test/docker-compose.yml exec -T traefik ls -lh /data/ipinfo_lite.mmdb
          echo "✅ MMDB file exists on disk"

          echo "Restarting Traefik to test loading MMDB from disk..."
          RESTART_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          docker compose -f test/docker-compose.yml restart traefik

          echo "Verifying MMDB file is still present after restart..."
          docker compose -f test/docker-compose.yml exec -T traefik ls -lh /data/ipinfo_lite.mmdb || {
            echo "❌ MMDB file missing after restart"
            exit 1
          }

          READY=0
          LAST_CODE=000
          for i in $(seq 1 60); do
            LAST_CODE=$(curl -s -o /dev/null -w '%{http_code}' -H "X-Forwarded-For: 8.8.8.8" http://localhost/ 2>/dev/null || echo 000)
            if [ "$LAST_CODE" = "403" ]; then
              echo "✅ Geo-blocking active after MMDB restart (US IP blocked)"
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -eq 0 ]; then
            echo "❌ Timed out waiting for geo-blocking after MMDB restart (last HTTP code: $LAST_CODE)"
            echo "--- Traefik logs since restart ---"
            docker compose -f test/docker-compose.yml logs traefik --since "$RESTART_AT" 2>&1 || true
            exit 1
          fi

          docker compose -f test/docker-compose.yml logs traefik --since "$RESTART_AT" 2>&1 | grep geoblock || true

      - name: Cleanup
        if: always()
        run: docker compose -f test/docker-compose.yml down -v 2>/dev/null || true

  memory-watch:
    name: Memory Watch — real databases
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only run when the token is available (push to main or PRs from the same repo).
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Run real-database memory watch tests
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
        run: |
          if [ -z "$IPINFO_TOKEN" ]; then
            echo "::warning::IPINFO_TOKEN secret not set — TestMemWatchReal_* tests will be skipped"
          fi
          go test -v -run 'TestMemWatchReal' -timeout 8m ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
